################################ status line ############################### {{{

# ─── Format strings ──────────────────────────────────────────────────
# Computed here (where tmux config vars are available) and stored as
# internal options. typhon.tmux reads these and interpolates them into
# the user's status-left/right templates.

# #{typhon_style} — prefix-aware fg/bg style
set-option -g @_typhon-style "#{?client_prefix,\
#[fg=${typhon_fg_active}]#[bg=${typhon_bg_active}],\
#[fg=${typhon_fg_default}]#[bg=${typhon_bg_default}]}"

# #{typhon_indicators} — all state badges
set-option -g @_typhon-indicators "\
#{?pane_synchronized,#[bg=${typhon_bg_sync}] (S) ,}\
#{?window_zoomed_flag,#[bg=${typhon_bg_zoom}] (Z) ,}\
$typhon_modes\
#{?#{==:#(tmux show-option -qv key-table),OFF_keytable},#[bg=${typhon_bg_off}] OFF ,}\
#{?#{==:#{pane_mode},copy-mode},#[bg=${typhon_bg_copy}] COPY ,}\
#{?selection_present,#[bg=${typhon_bg_select}] SELECTION ,}"

# ─── Default templates ───────────────────────────────────────────────
# Used when the user hasn't set @typhon-status-left / @typhon-status-right.
# Contain placeholder names that typhon.tmux will interpolate.

set-option -g @_typhon-default-status-left "\
#{typhon_style} Session: #S #{typhon_indicators}"

set-option -g @_typhon-default-status-right "\
#{typhon_style}#{typhon_indicators}\
#{?client_prefix,#[bg=${typhon_bg_active}],#[bg=${typhon_bg_default}]} \
#h | %a %b %d [UTC #($HOME/.config/bin/tmux-utc-date)] [%Z %I:%M%p] "

# ─── Non-left/right defaults ─────────────────────────────────────────

set-option -g status-left-length 80
set-option -g status-right-length 80
set-option -g status-justify centre
set-option -g window-status-format '#{?client_prefix,#[underscore],} #I: #W '
set-option -g window-status-current-format '#{?client_prefix,#[underscore],} #I: #W :) '
set-option -g status-style fg=${typhon_fg},bg=${typhon_bg}
set-option -g window-status-current-style bg=${typhon_bg_highlight}
set-option -g window-status-last-style bg=${typhon_bg_highlight_2}

############################################################################ }}}
